
<!DOCTYPE html>
<html lang="cs">
<head>
<meta charset="UTF-8">
<title>Majkl Snake hra</title>
	<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<style>
    body {
        text-align: center;
        font-family: Arial;
        background-color: #00008b;
        color: white;
    }
    canvas {
        background-color: white;
        margin-top: 20px;
	border: 3px solid gray;
    }
    button {
        margin-top: 10px;
        padding: 15px 25px;
        font-size: 18px;
        cursor: pointer;
    }

html, body {
    touch-action: manipulation;
}

button {
    touch-action: manipulation;
    -webkit-tap-highlight-color: transparent;
}

button {
    font-size: 20px;
}

.controls {
    margin-top: 15px;
}

.controls button {
    font-size: 24px;   /* velikost šipek */
    padding: 15px;     /* vnitřní mezera */
    margin: 5px;       /* mezera mezi tlačítky */
    width: 60px;       /* šířka tlačítka */
    height: 60px;      /* výška tlačítka */
    border-radius: 10px; /* zaoblení rohů */

background-color: #999;
    color: white;
    border: none;
}

.controls button:active {
    background-color: #555;
    transform: scale(0.95);


}

.container {
    display: flex;
    justify-content: center;
    align-items: flex-start;
    gap: 40px;
    margin-top: 20px;
}

.game {
    text-align: center;
}

.scores 
{
    background: #f5f5f5;
    color: black;
    padding: 15px;
    border-radius: 10px;
    min-width: 200px;
}

/* výchozí (PC) */
.container {
    display: flex;
    justify-content: center;
    align-items: flex-start;
    gap: 40px;
    margin-top: 20px;
}

/* 📱 MOBIL (responsive) */
@media (max-width: 600px) {
    .container {
        flex-direction: column;
        align-items: center;
    }

    canvas {
        width: 90vw;   /* přizpůsobí se šířce mobilu */
        height: 90vw;
        max-width: 400px;
        max-height: 400px;
    }

    .scores {
        width: 90%;
        margin-top: 20px;
    }
}



</style>
</head>
<body>

<h1>🐍 Rathgeber-Snake</h1>

<div class="container">
    
    <div class="game">
        <p>Skóre: <span id="score">0</span></p>
        
<canvas id="game" width="400" height="400"></canvas>
<br>

<div class="controls">
    <button onclick="setDirection('up')">⬆️</button><br>
    <button onclick="setDirection('left')">⬅️</button>
    <button onclick="setDirection('down')">⬇️</button>
    <button onclick="setDirection('right')">➡️</button>
</div>

<br>
<button onclick="restartGame()">Restart</button>

    </div>

    <div class="scores">
        <h2>🏆 TOP 10</h2>
        <ol id="highscores"></ol>
    </div>

</div>



<script>
const canvas = document.getElementById("game");
const ctx = canvas.getContext("2d");

const foodImage = new Image();
foodImage.src = "https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcSx33qibUyjBZYlqkn3XiTxohs_w_c7TNDo6Q&s";

const headImage = new Image();
headImage.src = "https://upload.wikimedia.org/wikipedia/commons/9/9d/ASD_smiley_big.gif?utm_source=commons.wikimedia.org&utm_campaign=index&utm_content=original";



const grid = 20;
let snake = [{x: 200, y: 200}];
let dx = grid;
let dy = 0;
let food = randomFood();
let score = 0;
let gameInterval;

document.addEventListener("keydown", changeDirection);

function gameLoop() {
    if (checkCollision()) {
        clearInterval(gameInterval);
        
let name = prompt("Konec hry! Zadej jméno (max 10 znaků):");

if (name) {
    name = name.substring(0, 10);
    saveScore(name, score);
} else {
    alert("Skóre: " + score);
}

        return;
    }

    const head = {x: snake[0].x + dx, y: snake[0].y + dy};
    snake.unshift(head);

    // jídlo
    if (head.x === food.x && head.y === food.y) {
        score++;
        document.getElementById("score").innerText = score;
        food = randomFood();
    } else {
        snake.pop();
    }

    drawGame();
}

function drawGame() {
    ctx.fillStyle = "white";
    ctx.fillRect(0, 0, canvas.width, canvas.height);

    // had
    
// TĚLO HADA (spojité)
ctx.strokeStyle = "green";
ctx.lineWidth = grid - 4;
ctx.lineCap = "round";
ctx.lineJoin = "round";

ctx.beginPath();
ctx.moveTo(
    snake[0].x + grid / 2,
    snake[0].y + grid / 2
);

for (let i = 1; i < snake.length; i++) {
    ctx.lineTo(
        snake[i].x + grid / 2,
        snake[i].y + grid / 2
    );
}

ctx.stroke();


// HLAVA HADA

ctx.drawImage(
    headImage,
    snake[0].x,
    snake[0].y,
    grid,
    grid
);





    // jídlo
    ctx.drawImage(foodImage, food.x, food.y, grid, grid);

}

function randomFood() {
    return {
        x: Math.floor(Math.random() * 20) * grid,
        y: Math.floor(Math.random() * 20) * grid
    };
}

function changeDirection(e) {
    if (e.key === "ArrowUp" && dy === 0) {
        dx = 0;
        dy = -grid;
    } else if (e.key === "ArrowDown" && dy === 0) {
        dx = 0;
        dy = grid;
    } else if (e.key === "ArrowLeft" && dx === 0) {
        dx = -grid;
        dy = 0;
    } else if (e.key === "ArrowRight" && dx === 0) {
        dx = grid;
        dy = 0;
    }
}

function checkCollision() {
    const head = snake[0];

    // stěny
    if (
        head.x < 0 ||
        head.y < 0 ||
        head.x >= canvas.width ||
        head.y >= canvas.height
    ) {
        return true;
    }

    // sám do sebe
    for (let i = 1; i < snake.length; i++) {
        if (head.x === snake[i].x && head.y === snake[i].y) {
            return true;
        }
    }

    return false;
}

function restartGame() {
    snake = [{x: 200, y: 200}];
    dx = grid;
    dy = 0;
    food = randomFood();
    score = 0;
    document.getElementById("score").innerText = score;
    clearInterval(gameInterval);
    gameInterval = setInterval(gameLoop, 100);
}

// start
gameInterval = setInterval(gameLoop, 160);


function saveScore(name, score) {
    let scores = JSON.parse(localStorage.getItem("snakeScores")) || [];

    scores.push({ name, score });

    // seřazení od nejvyššího
    scores.sort((a, b) => b.score - a.score);

    // pouze top 10
    scores = scores.slice(0, 10);

    localStorage.setItem("snakeScores", JSON.stringify(scores));

    displayScores();
}

function displayScores() {
    let scores = JSON.parse(localStorage.getItem("snakeScores")) || [];
    const list = document.getElementById("highscores");

    list.innerHTML = "";

    scores.forEach(s => {
        const li = document.createElement("li");
        li.textContent = s.name + " - " + s.score;
        list.appendChild(li);
    });
}


displayScores();


function setDirection(direction) {
    if (direction === "up" && dy === 0) {
        dx = 0;
        dy = -grid;
    }
    else if (direction === "down" && dy === 0) {
        dx = 0;
        dy = grid;
    }
    else if (direction === "left" && dx === 0) {
        dx = -grid;
        dy = 0;
    }
    else if (direction === "right" && dx === 0) {
        dx = grid;
        dy = 0;
    }
}



</script>

</body>
</html>
